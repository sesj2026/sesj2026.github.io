<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="563" height="523" viewBox="0 0 563 523">
  <!--
    Calendar icon:
    - Thick white outline
    - No fill on frame and separators
    - Only the six date circles are filled white
  -->
  <g stroke="#FFFFFF"
     stroke-width="28"
     stroke-linecap="round"
     stroke-linejoin="round">

    <!-- Outer rounded calendar body -->
    <rect x="14" y="84" width="535" height="425"
          rx="46" ry="46"
          fill="none"/>

    <!-- Top separator -->
    <line x1="28" y1="189" x2="535" y2="189"
          fill="none"/>

    <!-- Binding posts -->
    <line x1="135" y1="14" x2="135" y2="110"
          fill="none"/>
    <line x1="398" y1="14" x2="398" y2="110"
          fill="none"/>

    <!-- Filled date dots -->
    <circle cx="153" cy="281" r="26" fill="#FFFFFF" stroke="none"/>
    <circle cx="281" cy="281" r="26" fill="#FFFFFF" stroke="none"/>
    <circle cx="409" cy="281" r="26" fill="#FFFFFF" stroke="none"/>

    <circle cx="153" cy="381" r="26" fill="#FFFFFF" stroke="none"/>
    <circle cx="281" cy="381" r="26" fill="#FFFFFF" stroke="none"/>
    <circle cx="409" cy="381" r="26" fill="#FFFFFF" stroke="none"/>

  </g>
</svg>
